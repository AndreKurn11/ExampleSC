<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tambah Mobil</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>

  <body class="bg-light">
    <!-- Main Content -->
    <main class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-10">
          <div class="card shadow border-0 rounded-4">
            <div class="card-header bg-primary text-white py-3 rounded-top-4">
              <div
                class="d-flex justify-content-between align-items-center flex-wrap"
              >
                <h3 class="mb-0">
                  <i class="bi bi-car-front-fill me-2"></i>
                  Tambah Data Mobil
                </h3>

                <a href="index.html" class="btn btn-light btn-sm">
                  <i class="bi bi-arrow-left me-1"></i>
                  Kembali
                </a>
              </div>
            </div>

            <div class="card-body p-4">
              <p class="text-muted mb-4">
                Lengkapi informasi kendaraan yang akan ditambahkan ke sistem.
              </p>

              <form action="#" method="post" enctype="multipart/form-data">
                <div class="row">
                  <!-- Nama Mobil -->
                  <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold"> Nama Mobil </label>
                    <input
                      type="text"
                      class="form-control"
                      placeholder="Contoh : Toyota Avanza"
                    />
                  </div>

                  <!-- Merek -->
                  <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold"> Merek </label>
                    <input
                      type="text"
                      class="form-control"
                      placeholder="Contoh : Toyota"
                    />
                  </div>

                  <!-- Tahun -->
                  <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">
                      Tahun Kendaraan
                    </label>
                    <input
                      type="number"
                      class="form-control"
                      placeholder="2024"
                    />
                  </div>

                  <!-- Harga -->
                  <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">
                      Harga Sewa / Hari
                    </label>
                    <div class="input-group">
                      <span class="input-group-text"> Rp </span>
                      <input
                        type="number"
                        class="form-control"
                        placeholder="350000"
                      />
                    </div>
                  </div>

                  <!-- Status -->
                  <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold"> Status </label>
                    <select class="form-select">
                      <option>Tersedia</option>
                      <option>Disewa</option>
                    </select>
                  </div>

                  <!-- Upload Gambar -->
                  <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold"> Gambar Mobil </label>
                    <input type="file" class="form-control" accept="image/*" />
                    <small class="text-muted">
                      Upload gambar JPG, PNG atau JPEG.
                    </small>
                  </div>
                </div>

                <hr />

                <div class="d-flex justify-content-end gap-2">
                  <button type="reset" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-counterclockwise me-1"></i>
                    Reset
                  </button>

                  <button type="submit" class="btn btn-primary">
                    <i class="bi bi-floppy-fill me-1"></i>
                    Simpan Data
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center py-3 mt-5">
      <div class="container">
        <small>&copy; 2026 Sistem Manajemen Rental Mobil</small>
      </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
